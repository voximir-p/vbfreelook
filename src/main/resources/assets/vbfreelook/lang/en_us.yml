config.vbfreelook:
  title: Voximir's Better Freelook
  category:
    behavior:
      .: Behavior
      perspective:
        .: Perspective
        should_switch_perspective:
          .: Should Switch Perspective
          description: Whether to switch perspective when freelook is activated.
        should_switch_back_perspective:
          .: Should Switch Back Perspective
          description:
            .: |+
              Whether to switch back to the desired perspective when freelook is deactivated.


            always: >
              §lAlways§r: Switch back to the desired perspective when freelook is deactivated.
            if_unchanged: >
              §lIf Unchanged§r: Only switch back to the desired perspective
              if the perspective hasn't been changed while freelook was active.
            never: >
              §lNever§r: Keep the current perspective when freelook is deactivated.
        freelook_perspective:
          .: Freelook Perspective
          description: The perspective you switch to when freelook is activated.
        switch_back_perspective:
          .: Switch Back Perspective
          description:
            .: >
              Perspective to switch to when freelook is deactivated.
            original: |+


              §lOriginal Perspective§r: The last perspective before freelook was activated.
      transition:
        .: Transition
        zoom_out_time:
          .: Zoom Out Time
          description: >
            How many seconds it takes to zoom out from first person
            to second/third person when freelook is activated.
            
            §lSet it to zero to disable the transition.§r
        zoom_out_transition:
          .: Zoom Out Transition
          description: >
            The transition type used when zooming out.
      other:
        .: Other
        camera_no_clip:
          .: Camera No Clip
          description: >
            Enable this to allow the camera to clip through blocks when in
            second/third person perspective while freelook is active.
    controls:
      .: Controls
      basic:
        .: Basic
        freelook_key_behavior:
          .: Freelook Key Behavior
          description:
            .: |+
              The behavior of the freelook key.


            smart: >
              §lSmart§r: Tapping behaves like toggle, holding behaves like hold.
            hold: >
              §lHold§r: You have to hold the key to freelook.
            toggle: >
              §lToggle§r: Pressing the key toggles freelook on/off.
        smart_threshold:
          .: Smart Threshold
          description: >
            How many milliseconds you have to hold the freelook key
            for it to be considered a hold rather than a tap.
  enum:
    should_switch_back_perspective:
      always: Always
      if_unchanged: If Unchanged
      never: Never
    freelook_perspective:
      first_person: First Person
      second_person: Second Person
      third_person: Third Person
    switch_back_perspective:
      original: Original Perspective
      first_person: First Person
      second_person: Second Person
      third_person: Third Person
    transition_type:
      linear: Linear
      ease:
        in:
          sine: Ease In Sine
          quad: Ease In Quadratic
          cubic: Ease In Cubic
          exp: Ease In Exponential
        out:
          sine: Ease Out Sine
          quad: Ease Out Quadratic
          cubic: Ease Out Cubic
          exp: Ease Out Exponential
        in_out:
          sine: Ease In Out Sine
          quad: Ease In Out Quadratic
          cubic: Ease In Out Cubic
          exp: Ease In Out Exponential
    freelook_key_behavior:
      hold: Hold
      smart: Smart
      toggle: Toggle

key:
  category.vbfreelook: Voximir's Better Freelook
  vbfreelook:
    freelook: Freelook
    settings: Freelook Settings

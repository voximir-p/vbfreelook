config.vbfreelook:
  title: Voximir's Better Freelook
  category:
    behavior:
      .: Behavior
      basic:
        .: Basic
        option:
          switch_perspective:
            .: Switch Perspective
            description: Whether to switch perspective when freelook is activated.
          freelook_perspective:
            .: Freelook Perspective
            description: The perspective you switch to when freelook is activated.
    controls:
      .: Controls
      option:
        freelook_key_behavior:
          .: Freelook Key Behavior
          description:
            .: |+
              The behavior of the freelook key.


            smart: |
              §lSmart§r: Tapping behaves like toggle, holding behaves like hold.
            hold: >
              §lHold§r: You have to hold the key to freelook.
            toggle: >
              §lToggle§r: Pressing the key toggles freelook on/off.
        smart_threshold:
          .: Smart Threshold
          description: >
            How many milliseconds you have to hold the freelook key
            for it to be considered a hold rather than a tap.
  enum:
    freelook_key_behavior:
      hold: Hold
      smart: Smart
      toggle: Toggle
    freelook_perspective:
      first_person: First Person
      second_person: Second Person
      third_person: Third Person

key:
  category.vbfreelook: Voximir's Better Freelook
  vbfreelook:
    freelook: Freelook
    settings: Freelook Settings
